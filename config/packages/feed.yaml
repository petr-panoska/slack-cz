parameters:
    # YouTube channel IDs (UC...) — get them from a channel URL via "view source" → look for "channelId"
    feed.youtube.channels: []
        # Example:
        # - 'UCxxxxxxxxxxxxxxxxxxxxx'

    # Search queries — plain text or "#hashtag". Each query costs 100 quota units per fetch.
    # Free tier = 10k units/day. With TTL=21600s (6h) → 4 misses/day → 100 × 4 = 400 units/day per query.
    # Pre-2026: we ran 3 overlapping queries (#czechslackline, "czech slackline", "czech highline") with
    # 30-min TTL = 14 400 units/day → permanent quota exhaustion. Reduced to one specific hashtag.
    feed.youtube.queries:
        - '#czechslackline'

    # 6h cache. Community feed doesn't need to be real-time and we burn no quota inside the window.
    feed.cache.ttl_seconds: 21600

    # slackTV sectioned page (/tv) — separate from the homepage flat feed above.
    # Channels are @handles (resolved to their uploads playlist via forHandle, 1
    # quota unit). Playlists by id. Hashtags go through search (100 units each —
    # the only expensive source). Adding a source here is one line; the page +
    # load-more endpoint are generic over it.
    # NB: leading @ must be escaped as @@ in Symfony YAML (a single @ means a
    # service reference). The resolved parameter value is the literal "@handle".
    feed.tv.channels:
        - '@@kolouchrecetam'
        - '@@HIGHLIFEfilm'
        - '@@PhilipBitnar'
        - '@@slackshow4092'
        - '@@EQBcz'

    feed.tv.playlists:
        - 'PLzcHMTZU7KFpKEg-PVTgRloM4BF__EEmx'
        - 'PLoxabYJhgiYDSZr1c694xILPE_endi7FP'

    # NB: bare #highline / #trickline return junk (VW Highline cars, Satta Matka
    # charts) — qualified with "Slackline" to stay on-topic.
    feed.tv.hashtags:
        - '#czechslackline'
        - '#slacklife'
        - '#slackline'
        - '#highlineSlackline'
        - '#tricklineSlackline'

services:
    App\Feed\YoutubeFeedFetcher: ~
    App\Feed\MockFeedFetcher: ~
    App\Feed\FeedFetcherDispatcher: ~

    App\Feed\FeedFetcherInterface:
        class: App\Feed\CachedFeedFetcher
        arguments:
            $inner: '@App\Feed\FeedFetcherDispatcher'
            $cache: '@cache.app'
            $mock: '@App\Feed\MockFeedFetcher'
            $ttlSeconds: '%feed.cache.ttl_seconds%'

    App\Feed\Tv\TvFeedInterface:
        class: App\Feed\Tv\CachedTvFeed
        arguments:
            $inner: '@App\Feed\Tv\YoutubeTvFeed'
            $cache: '@cache.app'
            $mock: '@App\Feed\MockFeedFetcher'
            $ttlSeconds: '%feed.cache.ttl_seconds%'
