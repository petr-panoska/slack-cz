parameters:
    # GitHub repo, ze kterého se čtou .md soubory pro /wiki (highline guidebook).
    # Source of truth = `wiki/` adresář v tomto repu, plněný `scripts/wiki-import.php`
    # z Google Docu (Pandoc → MD pipeline). Editace MD = commit do main = live na webu.
    wiki.github.owner: 'petr-panoska'
    wiki.github.repo:  'slack-cz'
    wiki.github.branch: 'main'
    wiki.github.path:  'wiki'

    # 10 min — stejně jako docs (low-traffic feature, ~6 misses/h/list).
    # Detail content jde přes raw.githubusercontent.com (CDN, mimo API rate limit).
    wiki.cache.ttl_seconds: 600

    # Prefix routy pro interní rewrite linků v rendered MD (např. `[etika.md](etika.md)`
    # → `/wiki/etika`). Matchuje attribute na WikiController::show.
    wiki.internal_route_prefix: '/wiki'

services:
    App\Wiki\WikiFetcherInterface:
        class: App\Wiki\CachedWikiFetcher
        arguments:
            $inner: '@App\Wiki\GithubWikiFetcher'
            $cache: '@cache.app'
            $ttlSeconds: '%wiki.cache.ttl_seconds%'
