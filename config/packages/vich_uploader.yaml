vich_uploader:
    db_driver: orm
    metadata:
        type: attribute

    mappings:
        line_photo:
            uri_prefix: /uploads/line
            upload_destination: '%kernel.project_dir%/public/uploads/line'
            namer:
                service: Vich\UploaderBundle\Naming\UniqidNamer
            directory_namer:
                service: Vich\UploaderBundle\Naming\PropertyDirectoryNamer
                options: { property: 'line.id' }
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
