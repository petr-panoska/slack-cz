# Konfigurace MD sekcí (`/docs`, `/wiki`). Každá sekce = jedna instance
# `App\Markdown\Section\Config` + svůj FilesystemFetcher. Soubory žijí přímo
# v repu (`docs/`, `wiki/`) a čtou se z disku — deploy je `git pull`-ne, takže
# žádný runtime fetch z GitHubu ani cache vrstva netřeba.
#
# Přidání další sekce (např. `/changelog`):
#   1. Přidej `app.section.changelog.config` (Config) + `.fetcher` níž.
#   2. V `MarkdownSectionController` injectni je a přidej route metody.

services:

    # ───── docs sekce ─────────────────────────────────────────────────

    app.section.docs.config:
        class: App\Markdown\Section\Config
        arguments:
            $owner: 'petr-panoska'
            $repo: 'slack-cz'
            $branch: 'main'
            $path: 'docs'
            $internalRoutePrefix: '/docs'

    app.section.docs.fetcher:
        class: App\Markdown\Section\FilesystemFetcher
        arguments:
            $config: '@app.section.docs.config'
            $projectDir: '%kernel.project_dir%'

    # ───── wiki sekce (highline guidebook) ────────────────────────────

    app.section.wiki.config:
        class: App\Markdown\Section\Config
        arguments:
            $owner: 'petr-panoska'
            $repo: 'slack-cz'
            $branch: 'main'
            $path: 'wiki'
            $internalRoutePrefix: '/wiki'

    app.section.wiki.fetcher:
        class: App\Markdown\Section\FilesystemFetcher
        arguments:
            $config: '@app.section.wiki.config'
            $projectDir: '%kernel.project_dir%'

# ─── parametry pro MarkdownRenderer (interní MD link rewrite na /docs/{slug}) ───

parameters:
    # Použito v `App\Markdown\MarkdownRenderer::__construct` jako default prefix.
    # Každá sekce si pak při `render()` předává svůj vlastní (`/docs` nebo `/wiki`).
    docs.internal_route_prefix: '/docs'
