# Konfigurace MD sekcí (`/docs`, `/wiki`). Každá sekce = jedna instance
# `App\Markdown\Section\Config` + svůj GithubFetcher + CachedFetcher.
#
# Přidání další sekce (např. `/changelog`):
#   1. Přidej `app.section.changelog.config` (Config) + `.fetcher.inner` + `.fetcher` níž.
#   2. V `MarkdownSectionController` injectni je a přidej route metody.

services:

    # ───── docs sekce ─────────────────────────────────────────────────

    app.section.docs.config:
        class: App\Markdown\Section\Config
        arguments:
            $name: 'docs'
            $owner: 'petr-panoska'
            $repo: 'slack-cz'
            $branch: 'main'
            $path: 'docs'
            $internalRoutePrefix: '/docs'
            # Sidebar item label = filename (`architecture.md`). Docs nemají frontmatter title.
            $sidebarLabel: 'filename'
            $token: '%env(default::DOCS_GITHUB_TOKEN)%'

    app.section.docs.fetcher.inner:
        class: App\Markdown\Section\GithubFetcher
        arguments:
            $httpClient: '@http_client'
            $config: '@app.section.docs.config'

    app.section.docs.fetcher:
        class: App\Markdown\Section\CachedFetcher
        arguments:
            $inner: '@app.section.docs.fetcher.inner'
            $cache: '@cache.app'
            $cachePrefix: 'docs'
            # 10 min — dost čerstvé pro doc edity, ~6 misses/h/list = bez tahu na rate limit.
            $ttlSeconds: 600

    # ───── wiki sekce (highline guidebook) ────────────────────────────

    app.section.wiki.config:
        class: App\Markdown\Section\Config
        arguments:
            $name: 'wiki'
            $owner: 'petr-panoska'
            $repo: 'slack-cz'
            $branch: 'main'
            $path: 'wiki'
            $internalRoutePrefix: '/wiki'
            # Sidebar item label = frontmatter title (`Příprava` ne `priprava.md`).
            $sidebarLabel: 'title'
            $token: '%env(default::WIKI_GITHUB_TOKEN)%'

    app.section.wiki.fetcher.inner:
        class: App\Markdown\Section\GithubFetcher
        arguments:
            $httpClient: '@http_client'
            $config: '@app.section.wiki.config'

    app.section.wiki.fetcher:
        class: App\Markdown\Section\CachedFetcher
        arguments:
            $inner: '@app.section.wiki.fetcher.inner'
            $cache: '@cache.app'
            $cachePrefix: 'wiki'
            $ttlSeconds: 600

# ─── parametry pro MarkdownRenderer (interní MD link rewrite na /docs/{slug}) ───

parameters:
    # Použito v `App\Markdown\MarkdownRenderer::__construct` jako default prefix.
    # Každá sekce si pak při `render()` předává svůj vlastní (`/docs` nebo `/wiki`).
    docs.internal_route_prefix: '/docs'
