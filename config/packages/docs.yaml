parameters:
    # GitHub repo, ze kterého se čtou .md soubory pro /docs (online wiki).
    # Změna těchto hodnot = jiný source of truth (např. fork).
    docs.github.owner: 'petr-panoska'
    docs.github.repo:  'slack-cz'
    docs.github.branch: 'main'
    docs.github.path:  'docs'

    # 10 min — dost čerstvé pro wiki, zároveň ~6 misses/h/list = bez tahu na rate limit.
    # Detail content jde přes raw.githubusercontent.com (CDN, mimo API rate limit).
    docs.cache.ttl_seconds: 600

    # Prefix routy pro interní rewrite linků v rendered MD (např. `[migration.md](migration.md)`
    # → `/docs/migration`). Matchuje attribute na DocsController::show.
    docs.internal_route_prefix: '/docs'

services:
    # Map the interface to the cached decorator. Inner fetcher is autowired
    # via #[Autowire] attributes on its constructor params.
    App\Docs\DocsFetcherInterface:
        class: App\Docs\CachedDocsFetcher
        arguments:
            $inner: '@App\Docs\GithubDocsFetcher'
            $cache: '@cache.app'
            $ttlSeconds: '%docs.cache.ttl_seconds%'
