services:
  php-apache:
    build: ./docker/php
    ports:
      - 127.0.0.1:8090:80
    links:
      - db:db
    volumes:
      - .:/var/www/html/
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./docker/php/msmtprc:/etc/msmtprc:ro
  db:
    image: mysql:5.7
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: 'gslackczdb'
      MYSQL_USER: 'slackcz.44953'
      MYSQL_PASSWORD: 'user'
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - '127.0.0.1:3307:3306'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: