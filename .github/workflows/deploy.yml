name: deploy

# Auto-deploy push do main na beta.slack.cz (Hetzner VPS, native PHP-FPM + Postgres + Caddy).
# Mirror lokálního `make deploy` — používá stejné preflight skripty
# (`check-server-env.sh` + `check-caddy.sh`) a `deploy.sh` přes SSH bash -s.
#
# Required GH repo secrets:
#   DEPLOY_SSH_KEY   — privátní SSH klíč pro user `deploy` (=ed25519, lokálně ~/.ssh/slack_cz_prod)
#
# Když workflow selže na "Permission denied (publickey)", musíš v GH repo
# Settings → Secrets and variables → Actions přidat / aktualizovat DEPLOY_SSH_KEY.

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # manuální trigger z GH UI bez nutnosti push

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  SERVER_HOST: 178.105.81.158
  SERVER_USER: deploy

jobs:
  # Preflight gate — odmítne pustit deploy, pokud server nemá co bude potřebovat
  # (PHP extensions, writable dirs, .env.local klíče, …). Skript = spec, viz
  # docs/deploy.md sekce "Preflight check".
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check server env
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" 'bash -s' -- "${{ github.sha }}" \
            < scripts/check-server-env.sh

      - name: Check Caddy config drift
        env:
          SSH_KEY: /home/runner/.ssh/id_ed25519
          SSH_HOST: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: ./scripts/check-caddy.sh

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 "$SERVER_USER@$SERVER_HOST" 'bash -s' \
            < scripts/deploy.sh

      - name: Post-deploy smoke test
        run: |
          fail=0
          for path in / /mapa /wiki /docs /o-projektu; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "https://beta.slack.cz$path")
            printf '  %s  %s\n' "$code" "$path"
            if [ "$code" != "200" ] && [ "$code" != "302" ]; then
              fail=1
            fi
          done
          exit $fail
